<h2>Select your experience level</h2>

<p-floatlabel variant="on" style="min-width: 300px; display: block;">
  <p-select
    inputId="experienceLevel"
    [options]="experienceLevels"
    [ngModel]="selected()"
    (ngModelChange)="setSelected($event)"
    class="w-full"
  >
    <ng-template pOption let-level>{{ level.label }} – {{ level.ap }} AP</ng-template>
    <ng-template pSelectedItem let-level>{{ level.label }} – {{ level.ap }} AP</ng-template>
  </p-select>
  <label for="experienceLevel">Experience Level</label>
</p-floatlabel>
