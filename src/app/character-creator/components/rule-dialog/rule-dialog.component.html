<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '80vw', height: '80vh' }"
  [contentStyle]="{ overflow: 'hidden' }"
  [maximizable]="true"
  [closable]="true"
  [dismissableMask]="true"
  [baseZIndex]="10000"
  [header]="title()"
>
  <iframe
    [src]="fullUrl | safeUrl"
    width="100%"
    height="100%"
    frameborder="0"
  ></iframe>
</p-dialog>
